<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screensaver</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status"></div>

  <script>
    // ── Canvas setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Particle system ───────────────────────────────────────────────────────
    // Dimly-coloured particles drift slowly across a black background.
    // The continuous movement prevents OLED pixel burn-in while keeping
    // the vast majority of pixels fully black (power-efficient on OLED).

    const PARTICLE_COUNT = 18;
    const COLORS = [
      'rgba(80,  160, 255, ',   // blue
      'rgba(80,  255, 180, ',   // teal
      'rgba(200, 100, 255, ',   // purple
      'rgba(255, 180,  80, ',   // amber
      'rgba(255,  80, 120, ',   // pink
    ];

    class Particle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x      = Math.random() * canvas.width;
        this.y      = initial ? Math.random() * canvas.height
                              : (Math.random() < 0.5 ? -20 : canvas.height + 20);
        this.radius = 1.5 + Math.random() * 3.5;
        this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        // Very slow drift
        const speed = 0.15 + Math.random() * 0.35;
        const angle = Math.random() * Math.PI * 2;
        this.vx     = Math.cos(angle) * speed;
        this.vy     = Math.sin(angle) * speed;
        this.alpha  = 0.12 + Math.random() * 0.28;
        this.pulse  = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.004 + Math.random() * 0.008;
      }

      update() {
        this.x     += this.vx;
        this.y     += this.vy;
        this.pulse += this.pulseSpeed;

        const margin = 30;
        if (this.x < -margin || this.x > canvas.width  + margin ||
            this.y < -margin || this.y > canvas.height + margin) {
          this.reset();
        }
      }

      draw() {
        const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.radius * 3
        );
        gradient.addColorStop(0, this.color + a + ')');
        gradient.addColorStop(1, this.color + '0)');

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
    }

    // Larger, very slowly drifting "ghost" shapes add depth
    class GhostOrb {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x     = Math.random() * canvas.width;
        this.y     = initial ? Math.random() * canvas.height
                             : (Math.random() < 0.5 ? -80 : canvas.height + 80);
        this.r     = 60 + Math.random() * 80;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const speed = 0.05 + Math.random() * 0.12;
        const angle = Math.random() * Math.PI * 2;
        this.vx    = Math.cos(angle) * speed;
        this.vy    = Math.sin(angle) * speed;
        this.alpha = 0.03 + Math.random() * 0.05;
        this.pulse = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.002 + Math.random() * 0.004;
      }

      update() {
        this.x     += this.vx;
        this.y     += this.vy;
        this.pulse += this.pulseSpeed;

        const margin = this.r + 20;
        if (this.x < -margin || this.x > canvas.width  + margin ||
            this.y < -margin || this.y > canvas.height + margin) {
          this.reset();
        }
      }

      draw() {
        const a = this.alpha * (0.8 + 0.2 * Math.sin(this.pulse));
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.r
        );
        gradient.addColorStop(0, this.color + a + ')');
        gradient.addColorStop(1, this.color + '0)');

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
    }

    const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
    const orbs      = Array.from({ length: 4 }, () => new GhostOrb());

    function animate() {
      // Fill with pure black each frame (guarantees #000 on the canvas itself)
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      orbs.forEach(o => { o.update(); o.draw(); });
      particles.forEach(p => { p.update(); p.draw(); });

      requestAnimationFrame(animate);
    }

    animate();

    // ── Screen Wake Lock API ──────────────────────────────────────────────────
    // Uses the native Screen Wake Lock API to prevent the device from sleeping.
    // No video-playback trick; no third-party library required.

    const statusEl = document.getElementById('status');
    let wakeLock   = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) {
        statusEl.textContent = 'wake lock: not supported';
        return;
      }
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        statusEl.textContent = 'wake lock: active';

        wakeLock.addEventListener('release', () => {
          statusEl.textContent = 'wake lock: released';
          wakeLock = null;
        });
      } catch (err) {
        statusEl.textContent = 'wake lock: unavailable';
      }
    }

    // Re-acquire the lock whenever the page becomes visible again
    // (browsers automatically release it when the tab is hidden).
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    requestWakeLock();
  </script>
</body>
</html>
